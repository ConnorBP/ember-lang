# ember CI — build, test, static analysis, sanitizer, and fuzzing on every push/PR.
#
# Jobs:
#   build-test   — Windows + MinGW g++ + Ninja (the supported path): build + ctest
#   sanitizer    — Linux + g++ ASAN+UBSAN (catches UAF/OOB/UB/leaks; ASAN is
#                  unreliable on Windows/MinGW so this runs on Linux)
#   cppcheck     — static analysis (Linux for speed)
#   clang-tidy   — static bug-finding via compile_commands.json (Linux)
#   codeql       — GitHub-native C++ security scanning
#   fuzzer       — libFuzzer on .em loader + lexer (Linux; libFuzzer is Windows-unsupported)
#
# VST3 SDK is Windows-only (smtg_setup_platform_toolset fails on Linux), so all
# Linux jobs pass -DEMBER_BUILD_VST3=OFF.
# See docs/planning/plan_AUDIT_TOOLING.md for the full tooling rationale.
name: ci

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---- Core: build + test on the supported Windows/MinGW path ----
  build-test:
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-ninja
            mingw-w64-x86_64-cmake
      - shell: msys2 {0}
        run: |
          # Use PATH-resolved g++ (the msys2 action adds mingw64/bin to PATH).
          cmake -G Ninja \
            -DCMAKE_CXX_COMPILER=g++ \
            -DCMAKE_MAKE_PROGRAM=ninja \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
            -DEMBER_BUILD_VST3=OFF \
            -B build
          cmake --build build -j 8
      - shell: msys2 {0}
        run: |
          cd build
          ctest -E bench -LE soak --timeout 60 --output-on-failure
      - name: Validation gate
        shell: msys2 {0}
        run: |
          cd build
          ./ember_cli.exe run ../tests/lang/optimization_validation.ember --fn main \
            --passes constprop,forward,copyprop,instcombine,dce,licm,dse,simplifycfg,bounds-elim,sccp,unroll,spill_elim,peephole,lsr
          echo "validation exit: $?"

  # ---- Sanitizer build: ASAN + UBSAN (Linux — ASAN on Windows is experimental) ----
  sanitizer:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build g++
      - name: Configure sanitizer build
        run: |
          cmake -G Ninja \
            -DCMAKE_CXX_COMPILER=g++ \
            -DCMAKE_CXX_FLAGS="-O1 -g -fsanitize=address,undefined -fno-omit-frame-pointer" \
            -DCMAKE_EXE_LINKER_FLAGS="-fsanitize=address,undefined" \
            -DEMBER_BUILD_VST3=OFF \
            -B build_asan
      - name: Build
        run: cmake --build build_asan -j $(nproc) --target ember_cli
      - name: Run tests under ASAN+UBSAN
        env:
          ASAN_OPTIONS: detect_leaks=1:abort_on_error=1:print_stacktrace=1
          UBSAN_OPTIONS: print_stacktrace=1:halt_on_error=1
        run: |
          cd build_asan
          ./ember_cli test ../tests/lang 2>&1 | tail -5
          ./ember_cli run ../tests/lang/optimization_validation.ember --fn main \
            --passes constprop,forward,copyprop,instcombine,dce,licm,dse,simplifycfg,bounds-elim,sccp,unroll,spill_elim,peephole,lsr 2>&1 | tail -3
          echo "validation exit: $?"

  # ---- Static analysis: cppcheck (Linux) ----
  cppcheck:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - name: Install cppcheck
        run: sudo apt-get update && sudo apt-get install -y cppcheck
      - name: Run cppcheck
        run: |
          cppcheck --enable=warning,performance,portability,style \
            --suppress=missingIncludeSystem --suppress=unusedFunction \
            --suppress=duplInheritedMember \
            --inline-suppr --check-level=exhaustive \
            -I src -I include --force -j $(nproc) \
            src/ extensions/ 2>&1 \
            | grep -E 'warning:|error:|portability:|performance:' \
            | grep -v 'normalCheckLevelMaxBranches' \
            > cppcheck_findings.txt
          echo "Findings: $(wc -l < cppcheck_findings.txt)"
          cat cppcheck_findings.txt
          # Fail on errors and portability issues (warnings are advisory)
          if grep -qE 'error:|portability:' cppcheck_findings.txt; then
            echo "::error::cppcheck found errors or portability issues"
            exit 1
          fi

  # ---- Static analysis: clang-tidy (Linux) ----
  clang-tidy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - name: Install clang + cmake + ninja
        run: |
          sudo apt-get update
          sudo apt-get install -y clang clang-tidy cmake ninja-build
      - name: Configure (export compile commands, skip VST3)
        run: |
          cmake -G Ninja -DCMAKE_CXX_COMPILER=clang++ \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
            -DEMBER_BUILD_VST3=OFF \
            -B build_ci
      - name: Run clang-tidy
        run: |
          clang-tidy -p build_ci \
            --checks='-*,bugprone-*,clang-analyzer-*,cert-err33-c,cert-err34-c' \
            $(find src -name '*.cpp') 2>&1 \
            | grep -E 'warning:|error:' \
            | grep -v 'pointer arithmetic\|multi-level-implicit\|easily-swappable' \
            > clang_tidy_findings.txt || true
          echo "Findings: $(wc -l < clang_tidy_findings.txt)"
          cat clang_tidy_findings.txt

  # ---- GitHub CodeQL: security code scanning (C++) ----
  codeql:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build g++
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: cpp
          queries: security-extended
      - name: Build for CodeQL (skip VST3 — Windows-only)
        run: |
          cmake -G Ninja -DCMAKE_CXX_COMPILER=g++ \
            -DEMBER_BUILD_VST3=OFF -B build_codeql
          cmake --build build_codeql -j $(nproc) --target ember_cli
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:cpp"

  # ---- Fuzzing: libFuzzer on the .em loader + lexer (Linux only) ----
  fuzzer:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build clang
      - name: Configure + build fuzzers (skip VST3)
        run: |
          cmake -G Ninja -DCMAKE_CXX_COMPILER=clang++ \
            -DENABLE_FUZZERS=ON \
            -DEMBER_BUILD_VST3=OFF \
            -B build_fuzz
          cmake --build build_fuzz -j $(nproc) --target fuzz_em_loader fuzz_lexer
      - name: Seed corpus
        run: |
          mkdir -p corpus_loader corpus_lexer
          cp tests/lang/*.ember corpus_lexer/
          find . -name '*.em' -exec cp {} corpus_loader/ \; 2>/dev/null || true
      - name: Run .em loader fuzzer (2 min)
        run: |
          cd build_fuzz
          ./fuzz_em_loader -max_total_time=120 -max_len=65536 \
            ../corpus_loader 2>&1 | tail -20
      - name: Run lexer fuzzer (2 min)
        run: |
          cd build_fuzz
          ./fuzz_lexer -max_total_time=120 \
            ../corpus_lexer 2>&1 | tail -20
